services:
  postgres-tests:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gauges_test
      POSTGRES_USER: gauges
      POSTGRES_PASSWORD: gauges
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-tests:
    build:
      context: ./backend
    working_dir: /workspace
    command: >
      sh -lc "pip install --no-cache-dir -r requirements-dev.txt &&
      PYTHONPATH=/workspace pytest -q"
    volumes:
      - ./backend:/workspace
    environment:
      APP_ENV: test
      APP_DATABASE_URL: postgresql+asyncpg://gauges:gauges@postgres-tests:5432/gauges_test
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_STORAGE_DIR: /tmp/data
      APP_RTMP_BASE_URL: ${APP_RTMP_BASE_URL:-rtmp://nginx-rtmp:1935/live}
      APP_RTMP_STAT_URL: ${APP_RTMP_STAT_URL:-http://nginx-rtmp:8080/stat}
    depends_on:
      postgres-tests:
        condition: service_healthy
      redis:
        condition: service_healthy
