worker_processes 1;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            # wait_key/wait_video on часто ломают короткий grab одного кадра (ffmpeg -frames:v 1) и дают I/O error у подписчиков
            wait_key off;
            wait_video off;
            allow publish all;
            allow play all;
        }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /stat {
            rtmp_stat all;
        }
    }
}